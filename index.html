<!DOCTYPE html>
<html>
<head>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<style>
body { font-family: Arial; padding:10px; background:#f5f5f5; }
h2 { margin-bottom:10px; }
select,input { width:100%; padding:10px; margin:5px 0; border-radius:5px; }
.card { background:#fff; padding:10px; border-radius:10px; margin:8px 0; }
.green { border-left:6px solid green; }
.red { border-left:6px solid red; }
</style>
</head>
<body>
<h2>Drum Class Booking</h2>
<input type='date' id='dateFilter'>
<select id='locationFilter'>
<option value=''>All Locations</option>
<option>元朗</option>
<option>荔枝角</option>
<option>鑽石山</option>
<option>All</option>
</select>
<select id='timeFilter'>
<option value=''>All Time</option>
</select>
<div id='list'></div>
<script>
// Generate schedule for July and August 2026
const data = [];

function addScheduleEntry(date, weekday, time, availability, location) {
  data.push({
    'Date': date,
    'Weekday': weekday,
    'Time': time,
    'Availability': availability,
    'Location': location
  });
}

function getWeekday(date) {
  const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const d = new Date(date + 'T00:00:00Z');
  return days[d.getUTCDay()];
}

// Generate dates for July and August 2026
for (let month = 7; month <= 8; month++) {
  const daysInMonth = month === 7 ? 31 : 31;
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `2026-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const weekday = getWeekday(dateStr);
    
    // Tuesday: 元朗, 19:00–20:00 (Available), 20:00–21:00 (Available)
    if (weekday === 'Tue') {
      addScheduleEntry(dateStr, 'Tue', '19:00–20:00', 'Available', '元朗');
      addScheduleEntry(dateStr, 'Tue', '20:00–21:00', 'Available', '元朗');
    }
    
    // Thursday: 元朗, 19:00–20:00 (Booked), 20:00–21:00 (Available)
    if (weekday === 'Thu') {
      addScheduleEntry(dateStr, 'Thu', '19:00–20:00', 'Booked', '元朗');
      addScheduleEntry(dateStr, 'Thu', '20:00–21:00', 'Available', '元朗');
    }
    
    // Friday: 荔枝角, 19:00–20:00 (Available), 20:00–21:00 (Available)
    if (weekday === 'Fri') {
      addScheduleEntry(dateStr, 'Fri', '19:00–20:00', 'Available', '荔枝角');
      addScheduleEntry(dateStr, 'Fri', '20:00–21:00', 'Available', '荔枝角');
    }
    
    // Saturday: 鑽石山 14:00-18:00 (Available, 1 hour intervals), 18:00-19:00 (Booked), 19:00-21:00 (Available at 荔枝角)
    if (weekday === 'Sat') {
      // 鑽石山 14:00-18:00 (Available)
      addScheduleEntry(dateStr, 'Sat', '14:00–15:00', 'Available', '鑽石山');
      addScheduleEntry(dateStr, 'Sat', '15:00–16:00', 'Available', '鑽石山');
      addScheduleEntry(dateStr, 'Sat', '16:00–17:00', 'Available', '鑽石山');
      addScheduleEntry(dateStr, 'Sat', '17:00–18:00', 'Available', '鑽石山');
      // 18:00-19:00 (Booked)
      addScheduleEntry(dateStr, 'Sat', '18:00–19:00', 'Booked', '鑽石山');
      // 19:00-21:00 (Available at 荔枝角)
      addScheduleEntry(dateStr, 'Sat', '19:00–20:00', 'Available', '荔枝角');
      addScheduleEntry(dateStr, 'Sat', '20:00–21:00', 'Available', '荔枝角');
    }
    
    // Sunday: 元朗, 14:00-18:00 (Available, 1 hour intervals)
    if (weekday === 'Sun') {
      addScheduleEntry(dateStr, 'Sun', '14:00–15:00', 'Available', '元朗');
      addScheduleEntry(dateStr, 'Sun', '15:00–16:00', 'Available', '元朗');
      addScheduleEntry(dateStr, 'Sun', '16:00–17:00', 'Available', '元朗');
      addScheduleEntry(dateStr, 'Sun', '17:00–18:00', 'Available', '元朗');
    }
  }
}

// populate unique times
const timeSet = [...new Set(data.map(d=>d.Time))];
const timeSel = document.getElementById('timeFilter');
timeSet.sort().forEach(t=>{ let o=document.createElement('option');o.text=t;timeSel.add(o); });

function render(){
const dF=document.getElementById('dateFilter').value;
const lF=document.getElementById('locationFilter').value;
const tF=document.getElementById('timeFilter').value;
const list=document.getElementById('list');
list.innerHTML='';

data.filter(r=>
(!dF||r.Date==dF)&&(!lF||r.Location==lF||lF=='All')&&(!tF||r.Time==tF)
).forEach(r=>{
let div=document.createElement('div');
div.className='card '+(r.Availability=='Available'?'green':'red');
div.innerHTML=`<b>${r.Date}</b> (${r.Weekday})<br>${r.Time}<br>${r.Location}<br><b>${r.Availability}</b>`;
list.appendChild(div);
})
}

document.querySelectorAll('input,select').forEach(e=>e.addEventListener('change',render));
render();
</script>
</body>
</html>
